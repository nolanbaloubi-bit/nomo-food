<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <title>Menu | NOMO FOOD</title>

    <link rel="stylesheet" href="menu.css">
    <link rel="preload" as="image" href="images/plat-principal.jpg">
</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">
            <a href="index.html">
                <img src="images/logo.png" alt="Logo NOMO FOOD">
            </a>
        </div>

        <ul class="nav-links">
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="#">Localisation</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

    </nav>

</header>

<section class="menu-tabs">

    <ul>
        <li><a href="#" class="active">Fast Food</a></li>
        <li><a href="#">Plats Chauds</a></li>
        <li><a href="#">Boissons</a></li>
        <li><a href="#">Glaces</a></li>
    </ul>

<main class="menu-content">

    <section class="menu-section">

        <h2>Nos burgers</h2>

        <div class="cards">

    <div class="food-card">

        <img src="images/cheeseburger.jpg" alt="Cheeseburger">

        <div class="overlay">

            <h3>Cheeseburger</h3>

            <div class="card-bottom">

                <span class="price">2 500 FCFA</span>

                <button class="add-btn">+</button>

            </div>

        </div>

    </div>

    <div class="food-card">

        <img src="images/double-cheeseburger.jpg" alt="Double Cheeseburger">

        <div class="overlay">

            <h3>Double Cheeseburger</h3>

            <div class="card-bottom">

                <span class="price">4500 FCFA</span>

                <button class="add-btn">+</button>

            </div>

        </div>

    </div>

    <div class="food-card">

        <img src="images/triple-cheeseburger.jpg" alt="Triple Cheeseburger">

        <div class="overlay">

            <h3>Triple Cheeseburger</h3>

            <div class="card-bottom">

                <span class="price">5500 FCFA</span>

                <button class="add-btn">+</button>

            </div>

        </div>

    </div>

</div>

    </section>

</main>

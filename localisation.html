<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Localisation | NOMO FOOD</title>

    <link rel="stylesheet" href="localisation.css">

</head>

<body>

<header class="navbar">

    <div class="logo">

        <a href="index.html">

            <img src="images/logo.png" alt="Logo NOMO FOOD">

        </a>

    </div>

</header>

<a href="index.html" class="back-btn">×</a>

<section class="location">

    <h1>Notre localisation</h1>

    <p class="subtitle">

        Retrouvez facilement NOMO FOOD grâce à Google Maps.

    </p>

    <div class="map-container">

<iframe
src="https://www.google.com/maps?q=Supermarch%C3%A9%20DINA%20Cotonou%20Benin&output=embed"

height="100%"
style="border:0;"
allowfullscreen=""

</div>

<div class="location-info">

    <h2>📍 NOMO FOOD</h2>

    <p>

        Situé à proximité du Supermarché DINA,
        Cotonou - Bénin.

    </p>

    <a
    href="https://www.google.com/maps/search/?api=1&query=Supermarch%C3%A9+DINA+Cotonou+Benin"
    target="_blank"
    class="maps-btn">

        📍 Ouvrir dans Google Maps

    </a>

</div>

</section>

</body>

</html>
